name: CI
on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
      - run: go mod download
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
      - run: go build ./...
      - run: go test ./... -timeout 30s
